schema_version: 1

context:
  name: alibabacloud-tea-openapi
  version: "0.4.4"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/alibabacloud_tea_openapi-${{ version }}.tar.gz
  sha256: 1b0917bc03cd49417da64945e92731716d53e2eb8707b235f54e45b7473221ce

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - alibabacloud-tea-util >=0.3.13,<1.0.0
    - alibabacloud-credentials >=1.0.2,<2.0.0
    - alibabacloud-gateway-spi >=0.0.2,<1.0.0
    - cryptography >=3.0.0,<47.0.0
    - darabonba-core >=1.0.3,<2.0.0

tests:
  - python:
      imports:
        - alibabacloud_tea_openapi
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: Alibaba Cloud openapi SDK Library for Python
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/aliyun/darabonba-openapi

extra:
  recipe-maintainers:
    - xylar
